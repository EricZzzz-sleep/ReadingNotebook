<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes | Reading Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Literata:opsz,wght@7..72,600;7..72,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="notes">
  <div class="app-shell">
    <aside class="sidebar" aria-label="Main navigation">
      <div class="brand">
        <div>
          <strong>Reading Tracker</strong>
          <span>Personal library</span>
        </div>
      </div>

      <nav class="nav-list" aria-label="Reading sections">
        <a class="nav-item" href="index.html">Dashboard</a>
        <a class="nav-item" href="shelf.html">Shelf</a>
        <a class="nav-item active" href="notes.html" aria-current="page">Notes</a>
      </nav>

      <div class="sidebar-panel">
        <span class="panel-label">Notebook</span>
        <strong>126 notes</strong>
        <p>Quotes, side notes, and summary drafts collected across your books.</p>
      </div>
    </aside>

    <main class="page">
      <header class="topbar">
        <div>
          <p class="eyebrow">Notes workspace</p>
          <h1>Collect the ideas worth returning to.</h1>
        </div>
        <button class="primary-action" type="button" data-upload-pdf>Upload PDF</button>
      </header>

      <section class="notes-layout">
        <div class="notes-column" data-real-notes></div>
      </section>
    </main>
  </div>
  <script src="app.js" type="module"></script>
</body>
</html>
