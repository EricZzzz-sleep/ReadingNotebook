<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reader | Reading Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Literata:opsz,wght@7..72,600;7..72,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="reader">
  <div class="reader-sidebar-trigger" aria-hidden="true"></div>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Main navigation">
      <div class="brand">
        <div>
          <strong>Reading Tracker</strong>
          <span>Personal library</span>
        </div>
      </div>

      <nav class="nav-list" aria-label="Reading sections">
        <a class="nav-item" href="index.html">Dashboard</a>
        <a class="nav-item active" href="shelf.html" aria-current="page">Shelf</a>
        <a class="nav-item" href="notes.html">Notes</a>
      </nav>

      <div class="sidebar-panel">
        <span class="panel-label">Reading now</span>
        <strong id="readerSidebarTitle">PDF book</strong>
        <p id="readerSidebarMeta">Loading saved progress.</p>
      </div>
    </aside>

    <main class="page reader-page">
      <header class="topbar reader-topbar">
        <div>
          <p class="eyebrow">PDF reader</p>
          <h1 id="readerTitle">Opening book...</h1>
        </div>
        <div class="topbar-actions">
          <a class="ghost-action link-action" id="readerQuotesLink" href="notes.html">Quotes</a>
          <a class="ghost-action link-action" href="shelf.html">Back to Shelf</a>
        </div>
      </header>

      <div class="reader-workspace">
        <section class="reader-shell" aria-label="PDF reader">
          <div class="reader-toolbar">
            <button class="ghost-action" id="prevPage" type="button">Previous</button>
            <div class="reader-status">
              <strong id="pageStatus">Page - of -</strong>
              <span id="progressStatus">0% complete</span>
            </div>
            <div class="zoom-controls" aria-label="Zoom controls">
              <button class="ghost-action" id="zoomOut" type="button" aria-label="Zoom out">-</button>
              <span id="zoomStatus">100%</span>
              <button class="ghost-action" id="zoomIn" type="button" aria-label="Zoom in">+</button>
            </div>
            <button class="ghost-action" id="nextPage" type="button">Next</button>
          </div>

          <div class="reader-progress" aria-hidden="true">
            <span id="readerProgressBar"></span>
          </div>
          <p class="text-layer-status" id="textLayerStatus">Preparing selectable text...</p>

          <div class="pdf-stage">
            <div class="pdf-page-frame">
              <canvas id="pdfCanvas"></canvas>
              <div class="text-layer" id="textLayer" aria-label="Selectable page text"></div>
              <button class="selection-action" id="saveSelectedQuote" type="button" hidden>Save Quote</button>
            </div>
            <p class="empty-state" id="readerMessage">Loading PDF...</p>
          </div>
        </section>

        <section class="capture-panel" aria-label="Reading captures">
          <div class="reader-mode-switch" aria-label="Reader side panel mode">
            <button class="reader-mode-button active" type="button" data-reader-mode="notes" aria-pressed="true">Take note</button>
            <button class="reader-mode-button" type="button" data-reader-mode="quotes" aria-pressed="false">Page quotes</button>
          </div>

          <form class="capture-card" data-note-form>
            <div>
              <p class="eyebrow">Quote note</p>
              <h2>Save a passage</h2>
            </div>
            <label class="field-label">
              <span>Quote</span>
              <textarea class="field-input text-area" name="quote" rows="4" placeholder="Paste or type the quote from this page." required></textarea>
            </label>
            <label class="field-label">
              <span>Side note</span>
              <textarea class="field-input text-area" name="note" rows="3" placeholder="Why does it matter?"></textarea>
            </label>
            <button class="primary-action" type="submit">Save Note</button>
          </form>

          <div class="capture-card page-quotes-card" data-page-quotes-panel hidden>
            <div>
              <p class="eyebrow">Page quotes</p>
              <h2>Saved on this page</h2>
            </div>
            <div class="reader-page-quotes" data-reader-page-quotes></div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
