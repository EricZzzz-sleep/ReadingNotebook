<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shelf | Reading Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Literata:opsz,wght@7..72,600;7..72,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="shelf">
  <div class="app-shell">
    <aside class="sidebar" aria-label="Main navigation">
      <div class="brand">
        <div>
          <strong>Reading Tracker</strong>
          <span>Personal library</span>
        </div>
      </div>

      <nav class="nav-list" aria-label="Reading sections">
        <a class="nav-item" href="index.html">Dashboard</a>
        <a class="nav-item active" href="shelf.html" aria-current="page">Shelf</a>
        <a class="nav-item" href="notes.html">Notes</a>
      </nav>

    </aside>

    <main class="page">
      <header class="topbar">
        <div>
          <p class="eyebrow">Library shelf</p>
          <h1>Keep every book in reading order.</h1>
        </div>
        <button class="primary-action" type="button" data-upload-pdf>Upload PDF</button>
      </header>

      <section class="shelf-toolbar" aria-label="Shelf filters">
        <button class="filter-chip active" type="button" data-shelf-filter="all" aria-pressed="true">All books</button>
        <button class="filter-chip" type="button" data-shelf-filter="reading" aria-pressed="false">Reading</button>
        <button class="filter-chip" type="button" data-shelf-filter="completed" aria-pressed="false">Completed</button>
        <button class="filter-chip" type="button" data-shelf-filter="to-read" aria-pressed="false">To read</button>
      </section>

      <section class="shelf-grid" aria-label="Book shelf" data-book-grid>
        <div class="empty-library">
          <strong>Loading shelf...</strong>
          <p>Fetching your uploaded PDFs.</p>
        </div>
      </section>
    </main>
  </div>
  <script src="app.js" type="module"></script>
</body>
</html>
