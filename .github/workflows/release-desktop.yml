name: Build desktop installers

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    name: Build Mac installer
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: python -m pip install -r backend/requirements-desktop.txt
      - run: npm ci
      - name: Build Mac installer
        id: build-mac
        continue-on-error: true
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - name: Upload Mac artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: QuoteBook-mac
          path: dist/QuoteBook-mac.dmg
          if-no-files-found: warn
      - name: Verify Mac installer
        run: test -f dist/QuoteBook-mac.dmg

  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: python -m pip install -r backend/requirements-desktop.txt
      - run: npm ci
      - name: Build Windows installer
        id: build-windows
        continue-on-error: true
        run: npm run build:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - name: Upload Windows artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: QuoteBook-windows
          path: dist/QuoteBook-windows.exe
          if-no-files-found: warn
      - name: Verify Windows installer
        shell: pwsh
        run: |
          if (!(Test-Path "dist/QuoteBook-windows.exe")) {
            throw "Missing dist/QuoteBook-windows.exe"
          }

  publish-release:
    name: Publish installer downloads
    runs-on: ubuntu-latest
    needs: [build-mac, build-windows]
    steps:
      - uses: actions/checkout@v4
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Verify release assets
        run: |
          test -f release-assets/QuoteBook-mac/QuoteBook-mac.dmg
          test -f release-assets/QuoteBook-windows/QuoteBook-windows.exe
      - name: Attach installers to published release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            release-assets/QuoteBook-mac/QuoteBook-mac.dmg \
            release-assets/QuoteBook-windows/QuoteBook-windows.exe \
            --clobber
      - name: Create latest download release
        if: github.event_name != 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest \
            release-assets/QuoteBook-mac/QuoteBook-mac.dmg \
            release-assets/QuoteBook-windows/QuoteBook-windows.exe \
            --title "QuoteBook Latest" \
            --notes "Latest unsigned QuoteBook desktop installers for macOS and Windows." \
            --target "$GITHUB_SHA" \
            --latest
