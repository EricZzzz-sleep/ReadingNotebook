name: Build desktop installers

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    name: Build Mac installer (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
            script: build:mac:arm64
            file_arch: arm64
          - arch: x64
            runner: macos-15-intel
            script: build:mac:x64
            file_arch: x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: python -m pip install -r backend/requirements-desktop.txt
      - run: npm ci
      - name: Enable Mac notarization if secrets are configured
        run: node scripts/enable_notarization.js
        env:
          MAC_CERTIFICATE: ${{ secrets.MAC_CERTIFICATE }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - name: Configure Mac signing environment
        run: |
          if [[ -n "$MAC_CERTIFICATE" ]]; then
            echo "CSC_IDENTITY_AUTO_DISCOVERY=true" >> "$GITHUB_ENV"
            echo "CSC_LINK=$MAC_CERTIFICATE" >> "$GITHUB_ENV"
            echo "CSC_KEY_PASSWORD=$MAC_CERTIFICATE_PASSWORD" >> "$GITHUB_ENV"
          else
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
          fi
        env:
          MAC_CERTIFICATE: ${{ secrets.MAC_CERTIFICATE }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
      - name: Build Mac installer
        run: npm run ${{ matrix.script }}
        env:
          MAC_CERTIFICATE: ${{ secrets.MAC_CERTIFICATE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - name: List Mac build output
        run: find dist -maxdepth 2 -print
      - name: Verify Mac installer
        run: test -f dist/QuoteBook-mac-${{ matrix.arch }}.dmg
      - name: Create compatible Apple Silicon Mac download
        if: matrix.arch == 'arm64'
        run: cp dist/QuoteBook-mac-arm64.dmg dist/QuoteBook-mac.dmg
      - name: Verify Mac app architecture
        run: |
          mount_path="/tmp/QuoteBook-${{ matrix.arch }}"
          mkdir -p "$mount_path"
          hdiutil attach "dist/QuoteBook-mac-${{ matrix.arch }}.dmg" -readonly -nobrowse -mountpoint "$mount_path"
          trap 'hdiutil detach "$mount_path"' EXIT
          test -d "$mount_path/QuoteBook.app"
          file "$mount_path/QuoteBook.app/Contents/MacOS/QuoteBook" | grep "${{ matrix.file_arch }}"
          file "$mount_path/QuoteBook.app/Contents/Resources/backend/quotebook-backend" | grep "${{ matrix.file_arch }}"
      - name: Upload Apple Silicon Mac artifact
        if: matrix.arch == 'arm64'
        uses: actions/upload-artifact@v4
        with:
          name: QuoteBook-mac-${{ matrix.arch }}
          path: |
            dist/QuoteBook-mac-${{ matrix.arch }}.dmg
            dist/QuoteBook-mac.dmg
          if-no-files-found: error
      - name: Upload Intel Mac artifact
        if: matrix.arch == 'x64'
        uses: actions/upload-artifact@v4
        with:
          name: QuoteBook-mac-${{ matrix.arch }}
          path: dist/QuoteBook-mac-${{ matrix.arch }}.dmg
          if-no-files-found: error

  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: python -m pip install -r backend/requirements-desktop.txt
      - run: npm ci
      - name: Build Windows installer
        run: npm run build:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuoteBook-windows
          path: dist/QuoteBook-windows.exe
          if-no-files-found: error
      - name: Verify Windows installer
        shell: pwsh
        run: |
          if (!(Test-Path "dist/QuoteBook-windows.exe")) {
            throw "Missing dist/QuoteBook-windows.exe"
          }

  publish-release:
    name: Publish installer downloads
    runs-on: ubuntu-latest
    needs: [build-mac, build-windows]
    steps:
      - uses: actions/checkout@v4
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Verify release assets
        run: |
          test -f release-assets/QuoteBook-mac-arm64/QuoteBook-mac-arm64.dmg
          test -f release-assets/QuoteBook-mac-arm64/QuoteBook-mac.dmg
          test -f release-assets/QuoteBook-mac-x64/QuoteBook-mac-x64.dmg
          test -f release-assets/QuoteBook-windows/QuoteBook-windows.exe
      - name: Attach installers to published release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            release-assets/QuoteBook-mac-arm64/QuoteBook-mac-arm64.dmg \
            release-assets/QuoteBook-mac-arm64/QuoteBook-mac.dmg \
            release-assets/QuoteBook-mac-x64/QuoteBook-mac-x64.dmg \
            release-assets/QuoteBook-windows/QuoteBook-windows.exe \
            --clobber
      - name: Create latest download release
        if: github.event_name != 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest \
            release-assets/QuoteBook-mac-arm64/QuoteBook-mac-arm64.dmg \
            release-assets/QuoteBook-mac-arm64/QuoteBook-mac.dmg \
            release-assets/QuoteBook-mac-x64/QuoteBook-mac-x64.dmg \
            release-assets/QuoteBook-windows/QuoteBook-windows.exe \
            --title "QuoteBook Latest" \
            --notes "Latest QuoteBook desktop installers for macOS and Windows. Mac builds are architecture-specific: use arm64 for Apple Silicon and x64 for Intel." \
            --target "$GITHUB_SHA" \
            --latest
